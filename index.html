<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外幣追蹤卡片 - Shuin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 頂部導覽列 -->
        <nav class="navbar">
            <h1 class="app-title">外幣追蹤卡片</h1>
            <div class="nav-links">
                <a class="nav-btn active" href="index.html">首頁</a>
                <a class="nav-btn" href="management.html">管理</a>
            </div>
        </nav>

        <!-- 主頁 -->
        <main class="page active" id="main-page">
            <div class="card-container">
                <!-- 3D 翻轉卡片 -->
                <div class="card-wrapper" id="cardWrapper">
                    <div class="card" id="card">
                        <!-- 正面 -->
                        <div class="card-face card-front">
                            <div class="currency-code" id="currencyCode">USD</div>
                            <p class="card-hint">點擊翻轉</p>
                        </div>
                        <!-- 背面 -->
                        <div class="card-face card-back">
                            <div class="card-back-content">
                                <div class="back-title">新台幣匯率</div>
                                <div class="rate-section">
                                    <div class="rate-item">
                                        <label>對新台幣匯率</label>
                                        <div class="rate-value" id="rateToTWD">-</div>
                                    </div>
                                </div>
                                <div class="analysis-section">
                                    <label>備忘錄</label>
                                    <div class="analysis-text" id="analysisText">-</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 導覽控制列 -->
                <div class="card-controls">
                    <button class="control-btn" id="prevBtn">← 上一張</button>
                    <span class="card-indicator" id="cardIndicator">1 / 1</span>
                    <button class="control-btn" id="nextBtn">下一張 →</button>
                    <button class="control-btn" id="addCardBtn">＋新增卡片</button>
                </div>
            </div>
        </main>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
